<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MakeHaste App</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

</head>

<body class="bg-light">

<div class="container mt-5 text-center">

    <!-- Header Box -->
    <div class="bg-dark text-white p-4 rounded mx-auto w-50">
       
        <h1 class="mb-3">MakeHaste App</h1>
           
        <!-- Form -->
        <form class="d-flex justify-content-center gap-2">

            <!-- Input + error stacked vertically -->
            <div class="d-flex flex-column w-50">
                <input 
                   type="text" 
                   id="add-name" 
                   class="form-control" 
                   placeholder="New to-do">
                <div id="error-text" class="text-danger small mt-1" style="display: none;">
                   Please enter a name for the to-do item.
                </div>
            </div>

             <!-- Add button -->
            <button 
               type="button" 
               class="btn btn-primary"
               onclick="addItem()">
               Add
            </button>

        </form>

    </div>

    <!-- Counter -->
    <p id="counter" class="mt-4"></p>

    <!-- Todo Table -->
    <div class="d-flex justify-content-center mt-3">
        <table class="table table-striped table-bordered w-75 text-center">

            <thead class="table-dark">
                <tr>
                    <th>Task completion</th>
                    <th>Name</th>
                    <th>Edit</th>
                    <th>Delete</th>
                    <th>Time Created</th>
                    <th>Estimated Time</th>
                </tr>
            </thead>

            <tbody id="todos"></tbody>

        </table>
    </div>

</div>

<!-- Custom Modal -->
<!-- Task Reminder Modal -->
<div id="task-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
  <div style="background:white; padding:20px; border-radius:5px; text-align:center;">
    <p id="task-modal-text"></p>
    <button id="task-modal-done">Done</button>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Your JS file -->
<script src="js/site.js"></script>

<script>
getItems();
</script>

</body>
</html>
